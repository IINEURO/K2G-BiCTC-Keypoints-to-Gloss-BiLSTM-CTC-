name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile source and scripts
        run: python -m compileall src scripts
